<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jadwal & Event — 48ST Fan Hub</title>
<link rel="icon" type="image/png" href="/assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <img src="/assets/logo.png" alt="48ST Fan Hub" class="brand-logo">
    <h1>48ST <span class="accent">Fan Hub</span></h1>
  </div>
  <nav class="nav-links">
    <a href="index.html"><i class="fa-solid fa-newspaper"></i> News</a>
    <a href="schedule.html" class="active"><i class="fa-solid fa-calendar-days"></i> Schedule</a>
    <a href="jadwal.html"><i class="fa-solid fa-video"></i> Live Stream</a>
    <a href="profile.html"><i class="fa-solid fa-user"></i> Profil</a>
  </nav>
  <div class="actions">
    <a href="login.html" class="btn btn-outline" style="padding:9px 18px;font-size:13.5px;">
      <i class="fa-solid fa-right-to-bracket"></i> Masuk
    </a>
  </div>
</header>

<section class="section" style="padding-bottom:0;">
  <div class="section-head">
    <h3><i class="fa-solid fa-calendar-days" style="font-size:15px;margin-right:6px;"></i>Semua Jadwal & Event</h3>
  </div>

  <div class="simple-filter-row" id="type-filter">
    <button data-type="" class="active">Semua</button>
    <button data-type="SHOW">Show</button>
    <button data-type="EXCLUSIVE">Exclusive</button>
    <button data-type="EVENT">Event</button>
  </div>

  <div class="mini-filter-row">
    <select id="filter-month">
      <option value="">Semua Bulan</option>
      <option value="1">Januari</option><option value="2">Februari</option><option value="3">Maret</option>
      <option value="4">April</option><option value="5">Mei</option><option value="6">Juni</option>
      <option value="7">Juli</option><option value="8">Agustus</option><option value="9">September</option>
      <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
    </select>
    <select id="filter-year"><option value="">Semua Tahun</option></select>
  </div>

  <div id="schedule-list" class="simple-list">
    <div class="simple-list-item"><div class="skeleton" style="width:52px;height:52px;"></div></div>
  </div>

  <button class="load-more-arrow" id="load-more" style="display:none;">
    <i class="fa-solid fa-chevron-down"></i>
    <span id="load-more-label">Lihat lainnya</span>
  </button>
</section>

<nav class="bottom-nav">
  <a href="index.html"><i class="fa-solid fa-newspaper"></i>News</a>
  <a href="schedule.html" class="active"><i class="fa-solid fa-calendar-days"></i>Schedule</a>
  <a href="jadwal.html"><i class="fa-solid fa-video"></i>Live</a>
  <a href="profile.html"><i class="fa-solid fa-user"></i>Profil</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/icons.js"></script>
<script src="js/show-logo-map.js"></script>
<script src="js/member-photos.js"></script>
<script src="js/show-card.js"></script>
<script src="js/schedule.js"></script>
</body>
</html>
