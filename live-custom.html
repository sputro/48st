<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Custom — 48ST Testing</title>
<link rel="icon" type="image/png" href="/assets/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
  .lc-wrap { max-width: 1100px; margin: 0 auto; padding: 16px; }
  .lc-layout { display: flex; flex-direction: column; gap: 16px; }
  @media (min-width: 900px) { .lc-layout { flex-direction: row; align-items: flex-start; } }

  .lc-player-col { flex: 1; min-width: 0; }
  #art-player { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: var(--radius-lg); overflow: hidden; }

  .lc-url-form { display: flex; gap: 8px; margin-top: 12px; }
  .lc-url-form input {
    flex: 1; padding: 11px 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--line);
    font-size: 13.5px; font-family: monospace;
  }
  .lc-url-form input:focus { border-color: var(--red); outline: none; }

  .lc-chat-col { width: 100%; }
  @media (min-width: 900px) { .lc-chat-col { width: 340px; flex-shrink: 0; } }
  .lc-chat-box {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-lg);
    box-shadow: var(--shadow); display: flex; flex-direction: column; height: 460px;
  }
  .lc-chat-header { padding: 12px 16px; border-bottom: 1px solid var(--line); font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .lc-chat-messages { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
  .lc-chat-msg { font-size: 13px; line-height: 1.4; }
  .lc-chat-msg .sender { font-weight: 700; color: var(--red); }
  .lc-chat-msg .time { font-size: 10.5px; color: var(--muted); margin-left: 6px; }
  .lc-chat-input-row { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--line); }
  .lc-chat-input-row input {
    flex: 1; padding: 10px 12px; border-radius: 999px; border: 1.5px solid var(--line); font-size: 13px;
  }
  .lc-chat-input-row input:focus { border-color: var(--red); outline: none; }
  .lc-chat-input-row button {
    width: 40px; height: 40px; border-radius: 50%; background: var(--red); color: #fff; border: none; flex-shrink: 0;
  }

  /* Token gate */
  .lc-gate {
    position: fixed; inset: 0; background: var(--bg); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .lc-gate-card {
    background: var(--card); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
    padding: 32px 26px; max-width: 380px; width: 100%; text-align: center;
  }

  /* Floating feedback button */
  .fb-float-btn {
    position: fixed; bottom: 90px; right: 18px; z-index: 90;
    background: var(--red); color: #fff; border: none; border-radius: 999px;
    padding: 13px 20px; font-weight: 700; font-size: 13px; box-shadow: 0 8px 20px rgba(224,16,43,0.35);
    display: flex; align-items: center; gap: 8px; animation: fb-shake 3.5s ease-in-out infinite;
  }
  @keyframes fb-shake {
    0%, 90%, 100% { transform: rotate(0); }
    92% { transform: rotate(-4deg); }
    94% { transform: rotate(4deg); }
    96% { transform: rotate(-4deg); }
    98% { transform: rotate(4deg); }
  }
  @media (min-width: 780px) { .fb-float-btn { bottom: 24px; } }

  .fb-modal-overlay {
    position: fixed; inset: 0; background: rgba(23,21,26,.6); z-index: 210;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .fb-modal { background: #fff; border-radius: var(--radius-lg); padding: 24px; max-width: 420px; width: 100%; }
  .fb-modal textarea {
    width: 100%; min-height: 100px; padding: 12px; border-radius: var(--radius-sm); border: 1.5px solid var(--line);
    font-size: 13.5px; resize: vertical; margin: 12px 0;
  }
</style>
</head>
<body>

<!-- Gerbang token -->
<div class="lc-gate" id="token-gate">
  <div class="lc-gate-card">
    <div class="logo" style="margin-bottom:10px;"><img src="/assets/logo.png" alt="48ST" style="height:36px;"></div>
    <h2 style="margin-bottom:18px;">Masukkan Token Akses</h2>
    <div id="token-msg" class="form-msg"></div>
    <div class="field">
      <input type="text" id="token-input" placeholder="Kode token" style="width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--line);font-size:14px;">
    </div>
    <button class="btn btn-primary btn-block" id="token-submit" style="margin-top:12px;">
      <i class="fa-solid fa-unlock"></i> Masuk
    </button>
  </div>
</div>

<!-- Konten utama (kekunci sampai token valid) -->
<div id="main-content" style="display:none;">
  <header class="topbar">
    <div class="brand">
      <img src="/assets/logo.png" alt="48ST Fan Hub" class="brand-logo">
      <h1>48ST <span class="accent">Live Testing</span></h1>
    </div>
  </header>

  <div class="lc-wrap">
    <div class="lc-layout">
      <div class="lc-player-col">
        <div id="art-player"></div>
        <div id="stream-status" style="margin-top:10px;font-size:12.5px;color:var(--muted);"></div>
      </div>

      <div class="lc-chat-col">
        <div class="lc-chat-box">
          <div class="lc-chat-header"><i class="fa-solid fa-comments" style="color:var(--red);"></i> Live Chat</div>
          <div class="lc-chat-messages" id="chat-messages">
            <div class="empty-state" style="padding:20px;">Memuat chat...</div>
          </div>
          <form class="lc-chat-input-row" id="chat-form">
            <input type="text" id="chat-input" placeholder="Tulis pesan..." maxlength="300">
            <button type="submit"><i class="fa-solid fa-paper-plane"></i></button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Tombol feedback melayang -->
<button class="fb-float-btn" id="fb-open-btn" style="display:none;">
  <i class="fa-solid fa-triangle-exclamation"></i> <span id="fb-btn-text">Woy isi feedback!</span>
</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
<script src="js/live-custom.js"></script>
</body>
</html>
