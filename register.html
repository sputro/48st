<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar — 48ST Fan Hub</title>
<link rel="icon" type="image/png" href="/assets/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="logo"><img src="/assets/logo.png" alt="48ST Fan Hub" style="height:36px;"></div>
    <h2>Buat akun baru</h2>

    <div id="msg" class="form-msg"></div>

    <form id="register-form">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" required minlength="3" maxlength="20" pattern="[a-zA-Z0-9_]+" placeholder="username_kamu">
      </div>
      <div class="field">
        <label for="fullname">Nama Lengkap</label>
        <input type="text" id="fullname" required placeholder="Nama Lengkap">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" placeholder="nama@email.com">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="8" autocomplete="new-password" placeholder="Minimal 8 karakter">
      </div>
      <button type="submit" id="submit-btn" class="btn btn-primary btn-block">
        <i class="fa-solid fa-user-plus"></i> Daftar
      </button>
    </form>

    <div class="auth-switch">Sudah punya akun? <a href="login.html">Masuk</a></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
