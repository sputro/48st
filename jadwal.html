<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Stream & Jadwal Show — 48ST Fan Hub</title>
<link rel="icon" type="image/png" href="/assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
  .stream-grid { display: grid; grid-template-columns: 1fr; gap: 18px; }
  @media (min-width: 640px) { .stream-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 1024px) { .stream-grid { grid-template-columns: repeat(3, 1fr); } }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <img src="/assets/logo.png" alt="48ST Fan Hub" class="brand-logo">
    <h1>48ST <span class="accent">Fan Hub</span></h1>
  </div>
  <nav class="nav-links">
    <a href="index.html"><i class="fa-solid fa-newspaper"></i> News</a>
    <a href="schedule.html"><i class="fa-solid fa-calendar-days"></i> Schedule</a>
    <a href="jadwal.html" class="active"><i class="fa-solid fa-video"></i> Live Stream</a>
    <a href="profile.html"><i class="fa-solid fa-user"></i> Profil</a>
  </nav>
  <div class="actions">
    <img id="topbar-avatar" class="avatar" src="assets/profile/1.png" alt="avatar" style="display:none;">
    <a href="login.html" id="topbar-login" class="btn btn-outline" style="padding:9px 18px;font-size:13.5px;">
      <i class="fa-solid fa-right-to-bracket"></i> Masuk
    </a>
  </div>
</header>

<section class="section" style="padding-bottom:0;">
  <div class="tabs">
    <div class="tab active" data-status="live">Sedang Tayang</div>
    <div class="tab" data-status="upcoming">Akan Datang</div>
  </div>
  <div id="stream-grid" class="stream-grid" style="margin-top:18px;">
    <div class="stream-card"><div class="poster skeleton" style="height:190px;"></div></div>
    <div class="stream-card"><div class="poster skeleton" style="height:190px;"></div></div>
  </div>
</section>

<section class="section">
  <div class="section-head">
    <h3><i class="fa-solid fa-masks-theater" style="font-size:15px;margin-right:6px;"></i>Jadwal Show Teater</h3>
    <a href="schedule.html" class="see-all">Semua Jadwal &amp; Event</a>
  </div>

  <div id="countdown-wrap"></div>

  <div id="schedule-list" class="simple-list">
    <div class="schedule-card"><div class="skeleton" style="width:56px;height:56px;"></div></div>
  </div>
</section>

<nav class="bottom-nav">
  <a href="index.html"><i class="fa-solid fa-newspaper"></i>News</a>
  <a href="schedule.html"><i class="fa-solid fa-calendar-days"></i>Schedule</a>
  <a href="jadwal.html" class="active"><i class="fa-solid fa-video"></i>Live</a>
  <a href="profile.html"><i class="fa-solid fa-user"></i>Profil</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/icons.js"></script>
<script src="js/show-logo-map.js"></script>
<script src="js/members-data.js"></script>
<script src="js/jadwal.js"></script>
</body>
</html>
